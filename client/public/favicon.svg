<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
  </defs>

  <!-- Ballot paper outline with gradient stroke -->
  <rect x="8" y="6" width="84" height="108" rx="14" fill="white" stroke="url(#brand)" stroke-width="6"/>

  <!-- Big checkmark (top-left area) -->
  <path d="M22 48 l10 11 l20 -22" stroke="url(#brand)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Short line next to checkmark (like a candidate name) -->
  <rect x="58" y="43" width="24" height="7" rx="3.5" fill="url(#brand)" opacity="0.7"/>
  <rect x="58" y="55" width="16" height="7" rx="3.5" fill="url(#brand)" opacity="0.5"/>

  <!-- Divider line -->
  <line x1="20" y1="75" x2="80" y2="75" stroke="url(#brand)" stroke-width="3" stroke-linecap="round" opacity="0.3"/>

  <!-- Two text lines at the bottom -->
  <rect x="20" y="85" width="60" height="7" rx="3.5" fill="url(#brand)" opacity="0.5"/>
  <rect x="20" y="97" width="42" height="7" rx="3.5" fill="url(#brand)" opacity="0.35"/>
</svg>